name: Publish to PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          # Target Python 3.11 for Linux x86_64
          CIBW_BUILD: "cp311-manylinux_x86_64"
          
          # We use pip to install build tools because yum repos in 
          # older manylinux images (like 2014) are often deprecated.
          CIBW_BEFORE_BUILD: "pip install scikit-build-core pybind11 cmake ninja"
          
          # auditwheel converts the generic 'linux_x86_64' tag to 'manylinux...'
          # This is mandatory for PyPI uploads.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
          
          # Increase verbosity to see CMake output if something goes wrong
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    # Required for OIDC authentication
    permissions:
      id-token: write

    steps:
      - name: Download wheels from build job
        uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # This action uses your repository's Trusted Publisher settings 
          # or the PYPI_API_TOKEN secret.
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: trues