name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  build-wheels:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16
        env:
          CIBW_BUILD: "cp311-manylinux_x86_64"
          CIBW_BEFORE_ALL: "yum install -y cmake3 ninja-build || true"
          CIBW_BEFORE_BUILD: "pip install scikit-build-core pybind11 cmake ninja"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel show {wheel} &&
            auditwheel repair -w {dest_dir} {wheel} --plat manylinux2014_x86_64 ||
            (echo 'auditwheel failed, copying wheel as-is' && cp {wheel} {dest_dir})
          CIBW_BUILD_VERBOSITY: 2

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --skip-existing --verbose
