name: Publish to PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          # 1. Use the modern AlmaLinux 8 image to support newer C++ features
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          
          # 2. Target Python 3.11
          CIBW_BUILD: "cp311-manylinux_x86_64"
          
          # 3. Use pip to install build tools (reliable)
          CIBW_BEFORE_BUILD: "pip install scikit-build-core pybind11 cmake ninja"
          
          # 4. DEBUG COMMAND: This will print the "Missing Library" list before failing
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel show {wheel} && auditwheel repair -w {dest_dir} {wheel}"

          # 5. High verbosity so we can see the full compiler linking step
          CIBW_BUILD_VERBOSITY: 3

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true